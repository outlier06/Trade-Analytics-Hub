kind = "web"
previewPath = "/"
title = "GTrader"
version = "1.0.0"
id = "artifacts/gtrader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21454

[services.development]
run = "pnpm --filter @workspace/gtrader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gtrader", "run", "build" ]
publicDir = "artifacts/gtrader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21454"
BASE_PATH = "/"
